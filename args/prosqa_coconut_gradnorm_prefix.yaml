# ProsQA Coconut training — gradient norm logging for epochs 1-16 only
# Identical to prosqa_coconut_gradnorm.yaml except num_epochs=16 and different name

project: coconut
save_path: /network/scratch/m/michael.rizvi-martel/coconut_checkpoints
name: prosqa-coconut-gradnorm-v2-prefix

only_eval: False

coconut: True
cot: False
no_thoughts: False
no_cot: False

c_thought: 1
epochs_per_stage: 5
max_latent_stage: 6
pad_latent_to_max: True

save_only_improve: False
uniform_prob: 0.0
model_id: openai-community/gpt2
load_model_path: None
seed: 0
resume: 0
bf16: False
train_path: data/prosqa_train.json
val_path: data/prosqa_valid.json
reset_optimizer: True
batch_size_training: 16
debug: False
gradient_accumulation_steps: 2
num_epochs: 16
lr: !!float "1e-4"
weight_decay: 0.01

log_grad_norms: True
